version: 2

models:
  - name: dim_publishers
    description: "Publisher dimension table. One row per publisher."
    columns:
      - name: publisher_id
        description: "Primary key."
        tests:
          - unique
          - not_null
      - name: publisher_name
        tests:
          - not_null

  - name: dim_campaigns
    description: "Campaign dimension table. One row per campaign."
    columns:
      - name: campaign_id
        description: "Primary key."
        tests:
          - unique
          - not_null
      - name: campaign_status
        tests:
          - not_null

  - name: fct_ad_events_daily
    description: >
      Daily aggregated ad metrics.
      Grain: one row per event_date + publisher_id + device_type + country_code.
    meta:
      joins:
        - join: dim_publishers
          sql_on: "${dim_publishers.publisher_id} = ${fct_ad_events_daily.publisher_id}"
    columns:
      - name: event_date
        description: "Date of the ad events."
        tests:
          - not_null
      - name: publisher_id
        description: "FK to dim_publishers."
        tests:
          - not_null
          - relationships:
              to: ref('dim_publishers')
              field: publisher_id
      - name: impressions
        description: "Count of impression events."
        tests:
          - not_null
        meta:
          metrics:
            total_impressions:
              type: sum
      - name: clicks
        description: "Count of click events."
        meta:
          metrics:
            total_clicks:
              type: sum
      - name: revenue_usd
        description: "Total revenue in USD."
        tests:
          - not_null
        meta:
          metrics:
            total_revenue:
              type: sum
      - name: fill_rate
        description: "Ratio of filled impressions to total impressions (0.0-1.0)."
        meta:
          metrics:
            avg_fill_rate:
              type: average
      - name: ctr
        description: "Click-through rate: clicks / impressions."
        meta:
          metrics:
            avg_ctr:
              type: average
      - name: viewability_rate
        description: "Viewable impressions / total impressions."
        meta:
          metrics:
            avg_viewability_rate:
              type: average

  - name: fct_publisher_performance
    description: >
      Publisher-level daily rollup.
      Grain: one row per event_date + publisher_id.
    columns:
      - name: event_date
        description: "Date of the ad events."
        tests:
          - not_null
      - name: publisher_id
        tests:
          - not_null
      - name: publisher_name
        tests:
          - not_null
      - name: impressions
        description: "Total impressions."
        meta:
          metrics:
            total_impressions:
              type: sum
      - name: clicks
        description: "Total clicks."
        meta:
          metrics:
            total_clicks:
              type: sum
      - name: revenue_usd
        description: "Total revenue in USD."
        tests:
          - not_null
        meta:
          metrics:
            total_revenue:
              type: sum
      - name: fill_rate
        description: "Fill rate (0.0-1.0)."
        meta:
          metrics:
            avg_fill_rate:
              type: average
      - name: ctr
        description: "Click-through rate."
        meta:
          metrics:
            avg_ctr:
              type: average
